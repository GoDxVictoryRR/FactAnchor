services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: factanchor
      POSTGRES_USER: factanchor_app
      POSTGRES_PASSWORD: test_password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U factanchor_app -d factanchor" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/alembic:/alembic
    networks:
      - factanchor_net

  pgbouncer:
    image: edoburu/pgbouncer:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: factanchor_app
      DB_PASSWORD: test_password
      DB_HOST: postgres
      DB_NAME: factanchor
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/opt/bitnami/pgbouncer/conf/pgbouncer.ini
    ports:
      - "5432:5432"
    networks:
      - factanchor_net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - factanchor_net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - factanchor_net

  # --- Application ---
  api:
    build:
      context: ./backend
      dockerfile: ../docker/api.Dockerfile
    depends_on:
      pgbouncer:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - ./backend:/app
    networks:
      - factanchor_net

  worker:
    build:
      context: ./backend
      dockerfile: ../docker/worker.Dockerfile
    depends_on:
      pgbouncer:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=10 -Q verification
    volumes:
      - ./backend:/app
    networks:
      - factanchor_net

  flower:
    image: mher/flower:2.0
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: ${RABBITMQ_URL}
      CELERY_RESULT_BACKEND: ${REDIS_URL}
    ports:
      - "5555:5555"
    networks:
      - factanchor_net

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      target: deps
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - API_INTERNAL_URL=http://api:8000
    user: root
    command: npm run dev
    depends_on:
      api:
        condition: service_started
    networks:
      - factanchor_net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - factanchor_net

networks:
  factanchor_net:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
